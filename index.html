<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Pomodoro Focus - 專注時光</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bc:#0f172a; --cb:#1e293b; --tx:#fff; --fc:#f43f5e; --bk:#10b981; }
        * { box-sizing:border-box; margin:0; padding:0; font-family:'Inter', sans-serif; }
        body { background:var(--bc); color:var(--tx); display:flex; justify-content:center; align-items:center; min-height:100vh; overflow:hidden; }
        body.flash { background:#fff !important; transition:none !important; }
        .app-container { width:100%; max-width:420px; background:var(--cb); border-radius:40px; padding:2rem; display:flex; flex-direction:column; align-items:center; box-shadow:0 20px 40px rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1); }
        .top-bar { display:flex; justify-content:space-between; width:100%; }
        .i-btn { background:none; border:none; color:#94a3b8; font-size:1.6rem; cursor:pointer; padding:10px; }
        .i-btn.active { color:var(--fc); }
        .ring-box { position:relative; width:240px; height:240px; margin:20px 0; display:flex; justify-content:center; align-items:center; }
        .time { font-size:7.5rem; font-weight:800; line-height:1; font-variant-numeric: tabular-nums; }
        .status { font-size:1.2rem; color:#94a3b8; margin-bottom:2rem; letter-spacing:2px; }
        .btn { width:100%; padding:1.2rem; border-radius:20px; border:none; font-size:1.3rem; font-weight:700; cursor:pointer; }
        .btn-p { background:var(--fc); color:#fff; }
        body.m-bk .btn-p { background:var(--bk); }
        .c-btn { background:rgba(255,255,255,0.1); color:#fff; width:60px; height:60px; border-radius:50%; font-size:1.2rem; display:flex; justify-content:center; align-items:center; }
        .ovl { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); opacity:0; pointer-events:none; z-index:100; transition:0.3s; }
        .ovl.active { opacity:1; pointer-events:auto; }
        .mdl { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#2d3748; padding:2rem; border-radius:30px; width:90%; max-width:350px; z-index:110; opacity:0; pointer-events:none; transition:0.3s; text-align:center; }
        .mdl.active { opacity:1; pointer-events:auto; }
        .row { display:flex; justify-content:space-between; margin:15px 0; align-items:center; }
        input { padding:10px; border-radius:10px; width:80px; text-align:center; background:#1a202c; color:#fff; border:none; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-bar">
            <button class="i-btn" id="m-btn"><i class="fas fa-music"></i></button>
            <button class="i-btn" id="s-btn"><i class="fas fa-cog"></i></button>
        </div>
        <div class="ring-box">
            <svg width="240" height="240" style="transform: rotate(-90deg); position:absolute;">
                <circle stroke="rgba(255,255,255,0.05)" stroke-width="8" fill="none" r="110" cx="120" cy="120"/>
                <circle id="p-ring" stroke-width="8" fill="none" r="110" cx="120" cy="120" stroke-linecap="round" />
            </svg>
            <svg viewBox="0 0 100 100" width="110" height="110" style="position:absolute;">
                <path id="t-body" d="M50 90 C10 90 0 50 15 25 C25 10 40 10 50 15 C60 10 75 10 85 25 C100 50 90 90 50 90 Z" fill="var(--fc)"/>
                <path d="M50 15 C40 0 20 0 15 10 C30 15 40 15 50 20 Z" fill="#4ade80"/><path d="M50 15 C60 0 80 0 85 10 C70 15 60 15 50 20 Z" fill="#22c55e"/>
                <circle cx="35" cy="53" r="5" fill="#0f172a"/><circle cx="65" cy="53" r="5" fill="#0f172a"/>
                <path d="M47 62 Q50 66 53 62" fill="none" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
                <circle cx="27" cy="58" r="4" fill="rgba(255,180,180,0.6)"/><circle cx="73" cy="58" r="4" fill="rgba(255,180,180,0.6)"/>
                <circle cx="33" cy="51" r="1.5" fill="#fff"/><circle cx="63" cy="51" r="1.5" fill="#fff"/>
            </svg>
        </div>
        <div class="time" id="t-disp">25:00</div>
        <div class="status" id="s-disp">專注時間 (FOCUS)</div>
        <div class="controls">
            <button class="btn btn-p" id="run-btn">開始 (START)</button>
            <div style="display:flex; gap:1rem; margin-top:5px;">
                <button class="c-btn" id="fwd-btn"><i class="fas fa-forward-step"></i></button>
                <button class="c-btn" id="stop-btn"><i class="fas fa-stop"></i></button>
            </div>
        </div>
    </div>
    <div class="ovl" id="ovl"></div>
    <div class="mdl" id="mdl">
        <h2 style="margin-bottom:1rem">調整時間</h2>
        <div class="row"><span>專注 (分)</span><input type="number" id="inp-f" value="25"></div>
        <div class="row"><span>休息 (分)</span><input type="number" id="inp-b" value="5"></div>
        <button class="btn btn-p" id="save">儲存設定</button>
    </div>
    <script>
        let FOCUS = 25, BREAK = 5, timeLeft = FOCUS * 60, isRunning = false, mode = 'focus', musicOn = false, timer = null;
        let audioCtx, noise, osc, lfo;
        const ring = document.getElementById('p-ring'), circ = 110 * 2 * Math.PI;
        ring.style.strokeDasharray = circ;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function stopAudio() { if (noise) { try{noise.stop();}catch(e){} noise=null; } if (osc) { try{osc.stop();lfo.stop();}catch(e){} osc=null; } }
        function startAudio() {
            initAudio(); if (noise || osc) return;
            if (mode === 'focus') {
                const b = audioCtx.createBuffer(1, 2*audioCtx.sampleRate, audioCtx.sampleRate), d = b.getChannelData(0);
                for(let i=0; i<b.length; i++) d[i] = Math.random()*2-1;
                noise = audioCtx.createBufferSource(); noise.buffer = b; noise.loop = true;
                const g = audioCtx.createGain(); g.gain.value = 0.15;
                noise.connect(g); g.connect(audioCtx.destination); noise.start();
            } else {
                osc = audioCtx.createOscillator(); osc.type = 'sine'; osc.frequency.value = 330;
                const g = audioCtx.createGain(); 
                lfo = audioCtx.createOscillator(); lfo.frequency.value = 0.2;
                const lg = audioCtx.createGain(); lg.gain.value = 0.05;
                lfo.connect(lg); lg.connect(g.gain); g.gain.value = 0.08;
                osc.connect(g); g.connect(audioCtx.destination); lfo.start(); osc.start();
            }
        }

        function update() {
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('t-disp').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            document.getElementById('s-disp').innerText = mode === 'focus' ? '專注時間 (FOCUS)' : '休息時間 (BREAK)';
            document.body.className = mode === 'break' ? 'm-bk' : '';
            ring.style.stroke = mode === 'focus' ? '#f43f5e' : '#10b981';
            document.getElementById('t-body').setAttribute('fill', mode === 'focus' ? '#f43f5e' : '#10b981');
            ring.style.strokeDashoffset = circ - (timeLeft / ((mode==='focus'?FOCUS:BREAK)*60) * circ);
            document.getElementById('run-btn').innerText = isRunning ? '暫停 (PAUSE)' : '開始 (START)';
            document.getElementById('m-btn').classList.toggle('active', musicOn);
            if (musicOn) startAudio(); else stopAudio();
        }

        function tick() {
            if (timeLeft > 0) {
                timeLeft--; 
                if (timeLeft <= 5) {
                    initAudio(); const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.frequency.value = 880; g.gain.value = 0.1; o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.1);
                    document.body.classList.add('flash'); setTimeout(()=>document.body.classList.remove('flash'), 300);
                }
                update();
            } else {
                isRunning = false; clearInterval(timer); stopAudio();
                alert(mode === 'focus' ? '專注結束！' : '休息結束！');
                mode = mode === 'focus' ? 'break' : 'focus'; timeLeft = (mode === 'focus' ? FOCUS : BREAK) * 60; update();
            }
        }

        document.getElementById('run-btn').onclick = () => { initAudio(); if (isRunning) { isRunning = false; clearInterval(timer); } else { isRunning = true; timer = setInterval(tick, 1000); } update(); };
        document.getElementById('m-btn').onclick = () => { initAudio(); musicOn = !musicOn; update(); };
        document.getElementById('fwd-btn').onclick = () => { initAudio(); stopAudio(); mode = mode === 'focus' ? 'break' : 'focus'; timeLeft = (mode === 'focus' ? FOCUS : BREAK) * 60; update(); };
        document.getElementById('stop-btn').onclick = () => { initAudio(); isRunning = false; clearInterval(timer); stopAudio(); mode = 'focus'; timeLeft = FOCUS * 60; update(); };
        
        const ovl = document.getElementById('ovl'), mdl = document.getElementById('mdl');
        document.getElementById('s-btn').onclick = () => { ovl.classList.add('active'); mdl.classList.add('active'); };
        document.getElementById('save').onclick = () => {
            FOCUS = parseInt(document.getElementById('inp-f').value) || 25;
            BREAK = parseInt(document.getElementById('inp-b').value) || 5;
            timeLeft = (mode === 'focus' ? FOCUS : BREAK) * 60;
            ovl.classList.remove('active'); mdl.classList.remove('active'); update();
        };
        ovl.onclick = () => { ovl.classList.remove('active'); mdl.classList.remove('active'); };
        update();
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
    </script>
</body>
</html>
