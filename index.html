<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Pomodoro Focus - 專注時光</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;      
            --card-bg: rgba(30, 41, 59, 0.9); 
            --text-primary: #ffffff;  
            --text-secondary: #cbd5e1; 
            --focus-color: #f43f5e;   
            --focus-glow: rgba(244, 63, 94, 0.5);
            --break-color: #10b981;   
            --break-glow: rgba(16, 185, 129, 0.5);
            --transition-speed: 0.5s;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color var(--transition-speed) ease;
            padding: 20px;
        }

        body.flash-screen { background-color: rgba(244, 63, 94, 0.8) !important; }
        body.mode-break.flash-screen { background-color: rgba(16, 185, 129, 0.8) !important; }

        .app-container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 2.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .top-bar { display: flex; justify-content: space-between; width: 100%; margin-bottom: 1.5rem; }
        .icon-btn { background: transparent; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer; padding: 10px; border-radius: 50%; }

        .timer-section { width: 100%; display: flex; flex-direction: column; align-items: center; }

        .progress-ring-container {
            position: relative;
            width: 280px; height: 280px;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 2rem;
        }

        .progress-ring-track { stroke: rgba(255, 255, 255, 0.05); }
        .progress-ring-fill {
            stroke: var(--focus-color);
            transition: stroke-dashoffset 1s linear;
            filter: drop-shadow(0 0 10px var(--focus-glow));
        }
        body.mode-break .progress-ring-fill { stroke: var(--break-color); }

        .tomato-character-wrapper { position: absolute; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .timer-display-bottom { text-align: center; margin-bottom: 2.5rem; width: 100%; }
        .time {
            font-size: 8rem; /* 極限加大：無視力障礙設計 */
            font-weight: 800;
            line-height: 1;
            color: #fff;
            text-shadow: 0 0 30px rgba(255,255,255,0.2), 0 5px 15px rgba(0,0,0,0.8);
            font-variant-numeric: tabular-nums;
        }
        .status {
            font-size: 1.5rem;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        .controls { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
        .btn {
            width: 100%;
            padding: 1.2rem;
            border-radius: 20px;
            border: none;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            transition: all 0.3s;
        }
        .btn-primary { background: var(--focus-color); color: #fff; box-shadow: 0 8px 20px -6px var(--focus-glow); }
        body.mode-break .btn-primary { background: var(--break-color); }

        .secondary-controls { display: flex; gap: 1.5rem; }
        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            width: 65px; height: 65px; font-size: 1.4rem; border-radius: 50%;
            color: #fff; border: 1px solid rgba(255,255,255,0.1);
        }

        /* 彈出視窗 */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); opacity: 0; pointer-events: none; transition: 0.4s; z-index: 100; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; padding: 2rem; border-radius: 30px; width: 90%; max-width: 360px; z-index: 110; opacity: 0; pointer-events: none; transition: 0.4s; text-align: center; }
        .modal.active { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="mode-focus">
    <div class="app-container">
        <header class="top-bar">
            <button class="icon-btn" id="music-btn"><i class="fas fa-music"></i></button>
            <button class="icon-btn" id="settings-btn"><i class="fas fa-cog"></i></button>
        </header>

        <main class="timer-section">
            <div class="progress-ring-container">
                <svg width="280" height="280" style="transform: rotate(-90deg); position: absolute;">
                    <circle class="progress-ring-track" stroke-width="8" fill="transparent" r="130" cx="140" cy="140"/>
                    <circle class="progress-ring-fill" id="progress-ring" stroke-width="8" fill="transparent" r="130" cx="140" cy="140" stroke-linecap="round"/>
                </svg>
                <div class="tomato-character-wrapper">
                    <svg viewBox="0 0 100 100" width="140" height="140">
                        <path class="t-body" d="M50 90 C10 90 0 50 15 25 C25 10 40 10 50 15 C60 10 75 10 85 25 C100 50 90 90 50 90 Z" fill="var(--focus-color)"/>
                        <path class="t-leaf" d="M50 15 C40 0 20 0 15 10 C30 15 40 15 50 20 Z" fill="#4ade80"/><path class="t-leaf" d="M50 15 C60 0 80 0 85 10 C70 15 60 15 50 20 Z" fill="#22c55e"/>
                        <circle cx="35" cy="53" r="5" fill="#0f172a"/><circle cx="65" cy="53" r="5" fill="#0f172a"/>
                        <path d="M47 62 Q50 66 53 62" fill="none" stroke="#0f172a" stroke-width="3"/>
                    </svg>
                </div>
            </div>

            <div class="timer-display-bottom">
                <div class="time" id="time-display">25:00</div>
                <div class="status" id="status-display">專注時間 (Focus)</div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" id="main-btn"><i class="fas fa-play"></i> 開始 (Start)</button>
                <div class="secondary-controls">
                    <button class="icon-btn control-btn" id="skip-btn"><i class="fas fa-forward-step"></i></button>
                    <button class="icon-btn control-btn" id="end-btn"><i class="fas fa-stop"></i></button>
                </div>
            </div>
        </main>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="modal" id="settings-modal">
        <h3>時間設定</h3>
        <div style="margin: 20px 0; display:flex; justify-content: space-around;">
           <div>專注: <input type="number" id="setting-focus" value="25" style="width:50px"></div>
           <div>休息: <input type="number" id="setting-break" value="5" style="width:50px"></div>
        </div>
        <button class="btn btn-primary" id="save-settings-btn">儲存</button>
    </div>

    <script>
        // 改名後的 JavaScript 邏輯 (簡化核心)
        let FOCUS_TIME = 25 * 60, BREAK_TIME = 5 * 60, timeLeft = FOCUS_TIME;
        let isRunning = false, currentMode = 'focus', timerInterval = null;
        
        const circle = document.getElementById('progress-ring'), radius = 130, circumference = radius * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('time-display').textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            const total = (currentMode === 'break') ? BREAK_TIME : FOCUS_TIME;
            circle.style.strokeDashoffset = circumference - (timeLeft / total * circumference);
            document.getElementById('status-display').textContent = (currentMode === 'break') ? '休息時間 (Break)' : '專注時間 (Focus)';
            document.body.className = currentMode === 'break' ? 'mode-break' : 'mode-focus';
            document.getElementById('main-btn').innerHTML = isRunning ? '<i class="fas fa-pause"></i> 暫停 (Pause)' : '<i class="fas fa-play"></i> 開始 (Start)';
        }

        let audioCtx = null;
        function playBeep() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
            osc.frequency.value = 880; g.gain.value = 0.1;
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function tick() {
            if (timeLeft > 0) {
                timeLeft--;
                if (timeLeft <= 5) { playBeep(); document.body.classList.add('flash-screen'); setTimeout(()=>document.body.classList.remove('flash-screen'), 150); }
                updateDisplay();
            } else {
                isRunning = false; clearInterval(timerInterval);
                const msg = currentMode === 'focus' ? '該休息囉！' : '休息結束，開始專注！';
                if ("Notification" in window && Notification.permission === "granted") new Notification(msg);
                alert(msg);
                currentMode = currentMode === 'focus' ? 'break' : 'focus';
                timeLeft = currentMode === 'focus' ? FOCUS_TIME : BREAK_TIME;
                updateDisplay();
            }
        }

        document.getElementById('main-btn').onclick = () => {
            if (isRunning) { isRunning = false; clearInterval(timerInterval); }
            else { 
                if (Notification.permission === "default") Notification.requestPermission();
                isRunning = true; timerInterval = setInterval(tick, 1000); 
            }
            updateDisplay();
        };
        
        document.getElementById('skip-btn').onclick = () => {
            currentMode = currentMode === 'focus' ? 'break' : 'focus';
            timeLeft = currentMode === 'focus' ? FOCUS_TIME : BREAK_TIME;
            updateDisplay();
        };

        // PWA Service Worker 註冊
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
        
        updateDisplay();
    </script>
</body>
</html>
