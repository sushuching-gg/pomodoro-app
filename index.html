<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Pomodoro Focus - 專注時光</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color:#0f172a; --card-bg:#1e293b; --text:#fff; --focus:#f43f5e; --break:#10b981; }
        * { box-sizing:border-box; margin:0; padding:0; font-family:'Inter', sans-serif; }
        body { background:var(--bg-color); color:var(--text); display:flex; justify-content:center; align-items:center; min-height:100vh; overflow:hidden; }
        body.flash-screen { background:#fff !important; transition:none !important; }
        .app-container { width:100%; max-width:420px; background:var(--card-bg); border-radius:40px; padding:2rem; display:flex; flex-direction:column; align-items:center; box-shadow:0 20px 40px rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1); }
        .top-bar { display:flex; justify-content:space-between; width:100%; }
        .icon-btn { background:none; border:none; color:#94a3b8; font-size:1.6rem; cursor:pointer; padding:10px; }
        .icon-btn.active { color:var(--focus); }
        .progress-ring-container { position:relative; width:240px; height:240px; margin:20px 0; display:flex; justify-content:center; align-items:center; }
        .time { font-size:7.5rem; font-weight:800; line-height:1; }
        .status { font-size:1.2rem; color:#94a3b8; margin-bottom:2rem; text-transform:uppercase; letter-spacing:2px; }
        .controls { width:100%; display:flex; flex-direction:column; align-items:center; gap:10px; }
        .btn { width:100%; padding:1.2rem; border-radius:20px; border:none; font-size:1.3rem; font-weight:700; cursor:pointer; }
        .btn-primary { background:var(--focus); color:#fff; }
        body.mode-break .btn-primary { background:var(--break); }
        .control-btn { background:rgba(255,255,255,0.1); color:#fff; width:60px; height:60px; border-radius:50%; font-size:1.2rem; }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); opacity:0; pointer-events:none; z-index:100; transition:0.3s; }
        .overlay.active { opacity:1; pointer-events:auto; }
        .modal { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#2d3748; padding:2rem; border-radius:30px; width:90%; max-width:350px; z-index:110; opacity:0; pointer-events:none; transition:0.3s; text-align:center; }
        .modal.active { opacity:1; pointer-events:auto; }
        .setting-row { display:flex; justify-content:space-between; margin:15px 0; align-items:center; }
        input { padding:10px; border-radius:10px; border:none; width:80px; text-align:center; font-size:1.1rem; background:#1a202c; color:#fff; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-bar">
            <button class="icon-btn" id="music-btn"><i class="fas fa-music"></i></button>
            <button class="icon-btn" id="settings-btn"><i class="fas fa-cog"></i></button>
        </div>
        <div class="progress-ring-container">
            <svg width="240" height="240" style="transform: rotate(-90deg); position:absolute;">
                <circle stroke="rgba(255,255,255,0.05)" stroke-width="8" fill="transparent" r="110" cx="120" cy="120"/>
                <circle id="progress-ring" stroke-width="8" fill="transparent" r="110" cx="120" cy="120" stroke-linecap="round" />
            </svg>
            <svg viewBox="0 0 100 100" width="110" height="110" style="position:absolute;">
                <path id="tomato-body" d="M50 90 C10 90 0 50 15 25 C25 10 40 10 50 15 C60 10 75 10 85 25 C100 50 90 90 50 90 Z" fill="var(--focus)"/>
                <path d="M50 15 C40 0 20 0 15 10 C30 15 40 15 50 20 Z" fill="#4ade80"/><path d="M50 15 C60 0 80 0 85 10 C70 15 60 15 50 20 Z" fill="#22c55e"/>
                <circle cx="35" cy="53" r="5" fill="#0f172a"/><circle cx="65" cy="53" r="5" fill="#0f172a"/>
                <path d="M47 62 Q50 66 53 62" fill="none" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
                <circle cx="27" cy="58" r="4" fill="rgba(255,180,180,0.6)"/><circle cx="73" cy="58" r="4" fill="rgba(255,180,180,0.6)"/>
                <circle cx="33" cy="51" r="1.5" fill="#fff"/><circle cx="63" cy="51" r="1.5" fill="#fff"/>
            </svg>
        </div>
        <div class="time" id="time-display">25:00</div>
        <div class="status" id="status-display">專注時間 (FOCUS)</div>
        <div class="controls">
            <button class="btn btn-primary" id="main-btn">開始 (START)</button>
            <div style="display:flex; gap:1rem; margin-top:5px;">
                <button class="btn control-btn" id="skip-btn"><i class="fas fa-forward-step"></i></button>
                <button class="btn control-btn" id="end-btn"><i class="fas fa-stop"></i></button>
            </div>
        </div>
    </div>
    <div class="overlay" id="overlay"></div>
    <div class="modal" id="settings-modal">
        <h2 style="margin-bottom:1rem">調整時間</h2>
        <div class="setting-row"><span>專注 (分)</span><input type="number" id="set-focus" value="25"></div>
        <div class="setting-row"><span>休息 (分)</span><input type="number" id="set-break" value="5"></div>
        <button class="btn btn-primary" id="save-btn" style="margin-top:1rem">儲存並應用</button>
    </div>
    <script>
        let FOCUS_M = 25, BREAK_m = 5, timeLeft = FOCUS_M * 60, isRunning = false, mode = 'focus', timer = null, musicOn = false;
        let audioCtx = null, noiseNode = null, oscNode = null;
        const ring = document.getElementById('progress-ring'), circ = 110 * 2 * Math.PI;
        ring.style.strokeDasharray = circ;

        function initAudio() { 
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function stopAmbient() {
            if (noiseNode) { try{noiseNode.stop();}catch(e){} noiseNode = null; }
            if (oscNode) { try{oscNode.stop();}catch(e){} oscNode = null; }
        }

        
        function startAmbient() {
            initAudio(); 
            if (noiseNode && mode === 'focus') return;
            if (oscNode && mode === 'break') return;
            stopAmbient();
            const now = audioCtx.currentTime;
            if (mode === 'focus') {
                const bufferSize = 2 * audioCtx.sampleRate, buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate), data = buffer.getChannelData(0);
                for (let i=0; i<bufferSize; i++) data[i] = Math.random() * 2 - 1;
                noiseNode = audioCtx.createBufferSource(); noiseNode.buffer = buffer; noiseNode.loop = true;
                const gain = audioCtx.createGain(); gain.gain.value = 0.15; // 再次提高音量
                noiseNode.connect(gain); gain.connect(audioCtx.destination);
                noiseNode.start();
            } else {
                oscNode = audioCtx.createOscillator(); oscNode.type = 'sine'; oscNode.frequency.value = 330;
                const gain = audioCtx.createGain();
                const lfo = audioCtx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.2;
                const lg = audioCtx.createGain(); lg.gain.value = 0.05;
                lfo.connect(lg); lg.connect(gain.gain);
                gain.gain.setValueAtTime(0.08, now);
                oscNode.connect(gain); gain.connect(audioCtx.destination);
                lfo.start(); oscNode.start();
            }
        }
 else {
                oscNode = audioCtx.createOscillator(); oscNode.type = 'sine'; oscNode.frequency.value = 330;
                const gain = audioCtx.createGain(); gain.gain.value = 0.05;
                oscNode.connect(gain); gain.connect(audioCtx.destination);
                oscNode.start();
            }
        }

        function update() {
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('time-display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            document.getElementById('status-display').innerText = mode === 'focus' ? '專注時間 (FOCUS)' : '休息時間 (BREAK)';
            ring.style.stroke = mode === 'focus' ? '#f43f5e' : '#10b981';
            document.getElementById('tomato-body').setAttribute('fill', mode === 'focus' ? '#f43f5e' : '#10b981');
            ring.style.strokeDashoffset = circ - (timeLeft / ( (mode==='focus'?FOCUS_M:BREAK_m)*60 ) * circ);
            document.getElementById('main-btn').innerText = isRunning ? '暫停 (PAUSE)' : '開始 (START)';
            document.getElementById('music-btn').classList.toggle('active', musicOn);
            if (musicOn) startAmbient(); else stopAmbient();
        }

        function tick() {
            if (timeLeft > 0) {
                timeLeft--; 
                if (timeLeft <= 5) { 
                    initAudio(); const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.frequency.value = 880; g.gain.value = 0.1; o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.1); 
                    document.body.classList.add('flash-screen'); setTimeout(()=>document.body.classList.remove('flash-screen'), 300); 
                }
                update();
            } else {
                isRunning = false; clearInterval(timer); stopAmbient();
                alert(mode === 'focus' ? '時光飛逝，該休息囉！' : '休息結束，開始專注！');
                mode = mode === 'focus' ? 'break' : 'focus';
                timeLeft = (mode === 'focus' ? FOCUS_M : BREAK_m) * 60;
                update();
            }
        }

        document.getElementById('main-btn').onclick = () => { initAudio(); if (isRunning) { isRunning = false; clearInterval(timer); } else { isRunning = true; timer = setInterval(tick, 1000); } update(); };
        document.getElementById('music-btn').onclick = () => { initAudio(); musicOn = !musicOn; update(); };
        document.getElementById('skip-btn').onclick = () => { initAudio(); stopAmbient(); mode = mode === 'focus' ? 'break' : 'focus'; timeLeft = (mode === 'focus' ? FOCUS_M : BREAK_m) * 60; update(); };
        document.getElementById('end-btn').onclick = () => { initAudio(); isRunning = false; clearInterval(timer); stopAmbient(); mode = 'focus'; timeLeft = FOCUS_M * 60; update(); };

        const overlay = document.getElementById('overlay'), modal = document.getElementById('settings-modal');
        document.getElementById('settings-btn').onclick = () => { overlay.classList.add('active'); modal.classList.add('active'); };
        document.getElementById('save-btn').onclick = () => {
            FOCUS_M = parseInt(document.getElementById('set-focus').value) || 25;
            BREAK_m = parseInt(document.getElementById('set-break').value) || 5;
            timeLeft = (mode === 'focus' ? FOCUS_M : BREAK_m) * 60;
            overlay.classList.remove('active'); modal.classList.remove('active');
            update();
        };
        overlay.onclick = () => { overlay.classList.remove('active'); modal.classList.remove('active'); };
        update();
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
    </script>
</body>
</html>
