<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="watercolor-filter">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="4" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" />
      <feGaussianBlur stdDeviation="0.4" />
    </filter>
  </defs>

  <!-- Yellow/Gold Wash -->
  <circle cx="100" cy="100" r="85" fill="#fffacd" opacity="0.6" filter="url(#watercolor-filter)" />

  <!-- Microphone -->
  <rect x="85" y="40" width="30" height="60" rx="10" fill="#DAA520" filter="url(#watercolor-filter)" />
  <line x1="85" y1="50" x2="115" y2="50" stroke="#B8860B" stroke-width="2" />
  <line x1="85" y1="60" x2="115" y2="60" stroke="#B8860B" stroke-width="2" />
  <line x1="85" y1="70" x2="115" y2="70" stroke="#B8860B" stroke-width="2" />
  
  <rect x="95" y="100" width="10" height="50" fill="#333" filter="url(#watercolor-filter)" />
  <rect x="70" y="150" width="60" height="10" fill="#333" filter="url(#watercolor-filter)" />

  <!-- Headphones -->
  <path d="M50 100 Q50 30 100 30 Q150 30 150 100" fill="none" stroke="#222" stroke-width="6" filter="url(#watercolor-filter)" />
  <rect x="40" y="80" width="20" height="40" rx="5" fill="#111" filter="url(#watercolor-filter)" />
  <rect x="140" y="80" width="20" height="40" rx="5" fill="#111" filter="url(#watercolor-filter)" />
</svg>
