<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="watercolor">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="4" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G" />
      <feGaussianBlur stdDeviation="0.4" />
    </filter>
  </defs>

  <!-- Background Wash -->
  <rect width="400" height="300" fill="#fffacd" opacity="0.4" filter="url(#watercolor)"/>

  <!-- Vintage Mic Center -->
  <rect x="170" y="50" width="60" height="100" rx="20" fill="#f1c40f" filter="url(#watercolor)"/> <!-- Gold Mesh -->
  <line x1="170" y1="70" x2="230" y2="70" stroke="#d35400" stroke-width="2" opacity="0.5"/>
  <line x1="170" y1="90" x2="230" y2="90" stroke="#d35400" stroke-width="2" opacity="0.5"/>
  <line x1="170" y1="110" x2="230" y2="110" stroke="#d35400" stroke-width="2" opacity="0.5"/>

  <!-- Mic Stand -->
  <rect x="190" y="150" width="20" height="100" fill="#34495e" filter="url(#watercolor)"/>
  <path d="M150 250 L250 250" stroke="#34495e" stroke-width="10" filter="url(#watercolor)"/>
  
  <!-- Headphones hanging -->
  <path d="M100 200 Q100 50 200 50 Q300 50 300 200" fill="none" stroke="#2c3e50" stroke-width="8" filter="url(#watercolor)"/>
  <rect x="80" y="180" width="40" height="60" rx="10" fill="#2c3e50" filter="url(#watercolor)"/>
  <rect x="280" y="180" width="40" height="60" rx="10" fill="#2c3e50" filter="url(#watercolor)"/>
  
  <!-- Sound Waves (Abstract) -->
  <path d="M350 150 Q370 150 370 180 T350 210" fill="none" stroke="#e67e22" stroke-width="3" opacity="0.6" filter="url(#watercolor)"/>
  <path d="M50 150 Q30 150 30 180 T50 210" fill="none" stroke="#e67e22" stroke-width="3" opacity="0.6" filter="url(#watercolor)"/>

</svg>
